<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP Mart Mega Store</title>
<link rel="icon" href="mart.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f4f6f9;color:#222}

/* HEADER */
header{
background:linear-gradient(90deg,#0f172a,#1e293b);
color:#fff;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
position:sticky;
top:0;
z-index:99;
}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:45px}

.search-box{
display:flex;
width:45%;
min-width:260px;
background:#fff;
border-radius:8px;
overflow:hidden;
}
.search-box input{
width:100%;
padding:10px;
border:none;
outline:none;
}
.search-box button{
padding:10px 15px;
border:none;
background:#facc15;
cursor:pointer;
}

#cartBtn{
background:#facc15;
color:#000;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* BANNER */
.banner{
width:95%;
margin:20px auto;
padding:35px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
background:linear-gradient(135deg,#111827,#2563eb,#06b6d4);
color:#fff;
}
.left h1{font-size:46px}
.left h2{color:#fde047;margin:8px 0}
.left button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#facc15;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}
.banner-img{
width:100%;
max-width:400px;
border-radius:15px;
}

/* PRODUCT SLIDER */
.slider{
width:95%;
height:330px;
margin:25px auto;
position:relative;
overflow:hidden;
border-radius:20px;
background:#fff;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}
.slide{
width:100%;
height:100%;
object-fit:contain;
position:absolute;
opacity:0;
transition:1s;
padding:10px;
}
.slide.active{opacity:1}
.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.7);
color:#fff;
border:none;
padding:12px;
border-radius:50%;
cursor:pointer;
z-index:2;
}
.prev{left:15px}
.next{right:15px}

/* PRODUCTS */
.products{
width:95%;
margin:auto;
padding:25px 0;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.card{
background:#fff;
padding:14px;
border-radius:15px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,.08);
transition:.3s;
}
.card:hover{transform:translateY(-8px)}
.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}
.card h3{margin:10px 0}
.card p{font-size:22px;color:#059669;font-weight:bold}
.card button{
width:100%;
padding:11px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#facc15,#f59e0b);
font-weight:bold;
cursor:pointer;
}

/* CART */
#cartModal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
justify-content:center;
align-items:center;
z-index:999;
}
#cartContent{
background:#fff;
width:360px;
max-height:90%;
overflow:auto;
padding:25px;
border-radius:18px;
}
#cartItems{padding-left:20px;margin:10px 0}
#cartContent input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:8px;
}
.buyBtn,.closeBtn{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
}
.buyBtn{background:#facc15;font-weight:bold}

/* POPUP */
#popup{
position:fixed;
right:20px;
bottom:-100px;
background:#16a34a;
color:#fff;
padding:12px 18px;
border-radius:10px;
transition:.4s;
}
#popup.show{bottom:20px}

footer{
margin-top:20px;
background:#0f172a;
color:#fff;
padding:15px;
text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="mart.png">
<h2>SP Mart</h2>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search Products..." onkeyup="liveSearch()">
<button>🔍</button>
</div>

<div id="cartBtn">🛒 (<span id="count">0</span>)</div>
</header>

<!-- BANNER -->
<div class="banner">
<div class="left">
<h1>MEGA SALE</h1>
<h2>UP TO 70% OFF</h2>
<p>1000+ Products Available</p>
<button onclick="window.scrollTo(0,700)">Shop Now</button>
</div>

<div class="center">
<img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=900" class="banner-img">
</div>
</div>

<!-- SLIDER -->
<div class="slider">
<button class="nav prev">❮</button>

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=900" class="slide active">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=900" class="slide">

<button class="nav next">❯</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div id="cartModal">
<div id="cartContent">
<h3>Shopping Cart</h3>
<ul id="cartItems"></ul>
<p id="cartTotal">Total ₹0</p>

<h4>Customer Details</h4>
<input type="text" id="custName" placeholder="Full Name">
<input type="email" id="custEmail" placeholder="Email">
<input type="text" id="custPhone" placeholder="Phone">
<input type="text" id="custAddress" placeholder="Address">

<button onclick="placeOrder()" class="buyBtn">Buy Now</button>
<button onclick="closeCart()" class="closeBtn">Close</button>
</div>
</div>

<div id="popup"></div>

<footer>
© 2026 SP Mart Mega Store
</footer>

<script>
let cart=[];

/* FREE STOCK IMAGES */
const imgSet=[
"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600",
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600",
"https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600",
"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600",
"https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=600",
"https://images.unsplash.com/photo-1547949003-9792a18a2601?w=600",
"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600",
"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600",
"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600",
"https://images.unsplash.com/photo-1542272604-787c3835535d?w=600"
];

const categories=["Bottle","Shoes","Watch","Laptop","Phone","Bag","Headphone","Chair","Tshirt","Camera"];
const products=[];

/* 1200 PRODUCTS */
for(let i=1;i<=1200;i++){
products.push({
name:categories[i%categories.length]+" "+i,
price:99+(i*12),
img:imgSet[i%imgSet.length]
});
}

products.sort((a,b)=>a.price-b.price);

/* RENDER */
function renderProducts(list){
productsBox=document.getElementById("products");
productsBox.innerHTML="";

list.forEach(p=>{
productsBox.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add</button>
</div>`;
});
}
renderProducts(products);

/* SEARCH */
function liveSearch(){
let val=searchInput.value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
renderProducts(filtered);
}

/* CART */
function addToCart(name,price){
cart.push({name,price});
count.innerText=cart.length;
showPopup(name+" Added");
}

cartBtn.onclick=showCart;

function showCart(){
let total=0;
cartItems.innerHTML="";
cart.forEach(i=>{
cartItems.innerHTML+=`<li>${i.name} ₹${i.price}</li>`;
total+=i.price;
});
cartTotal.innerText="Total ₹"+total;
cartModal.style.display="flex";
}

function closeCart(){
cartModal.style.display="none";
}

function placeOrder(){
if(!custName.value||!custEmail.value||!custPhone.value||!custAddress.value){
showPopup("Fill all details");
return;
}
showPopup("Order Placed");
cart=[];
count.innerText=0;
closeCart();
}

/* POPUP */
function showPopup(msg){
popup.innerText=msg;
popup.classList.add("show");
setTimeout(()=>popup.classList.remove("show"),2000);
}

/* SLIDER */
let slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"));
slides[i].classList.add("active");
}

function nextSlide(){
index=(index+1)%slides.length;
showSlide(index);
}

function prevSlide(){
index=(index-1+slides.length)%slides.length;
showSlide(index);
}

document.querySelector(".next").onclick=nextSlide;
document.querySelector(".prev").onclick=prevSlide;

setInterval(nextSlide,3000);
</script>

</body>
</html>
