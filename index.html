<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP Mart</title>
<link rel="icon" href="mart.png">

<style>
body{margin:0;font-family:Arial;background:#f3f3f3;}
header{background:#131921;color:white;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
header img{height:40px;}
#cartBtn{cursor:pointer;background:#ffd814;color:black;padding:5px 10px;border-radius:5px;}

/* 🔥 SLIDER */
.slider{width:100%;height:250px;position:relative;overflow:hidden;}
.slide{width:100%;height:250px;object-fit:cover;position:absolute;opacity:0;transition:1s;}
.slide.active{opacity:1;}

/* SEARCH */
.search-box{display:flex;width:40%;}
.search-box input{width:100%;padding:8px;border:none;}
.search-box button{padding:8px;background:#febd69;border:none;}

/* FILTER */
.filter{text-align:center;margin:10px;}
.filter button{margin:5px;padding:8px;background:#ffd814;border:none;border-radius:5px;}

/* BANNER */
.banner{display:flex;justify-content:space-between;align-items:center;padding:40px;flex-wrap:wrap;color:white;background:linear-gradient(135deg,#000,#1a1a1a,#3a3a3a);border-radius:15px;margin:20px;}
.left h1{font-size:40px;margin:0;}
.left h2{color:#ffd814;}
.center{text-align:center;}
.qr-img{width:180px;padding:10px;border-radius:15px;animation:pulse 2s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}

/* PRODUCTS */
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card{background:white;padding:15px;border-radius:10px;text-align:center;}
.card img{width:100%;height:200px;object-fit:cover;}
.card button{background:#ffd814;border:none;padding:10px;margin-top:10px;width:100%;cursor:pointer;}

footer{background:#eaeaf0;padding:20px;}
.footer-bottom{background:#131921;color:white;text-align:center;padding:10px;}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="mart.png">
<h2>SP Mart</h2>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search..." onkeyup="liveSearch()">
<button>🔍</button>
</div>

<div id="cartBtn">🛒 (<span id="count">0</span>)</div>
</header>

<!-- 🔥 SLIDER -->
<div class="slider">
<img src="bottle.jpg" class="slide active">
<img src="bottle1.jpg" class="slide">
<img src="bottle2.jpg" class="slide">
<img src="j.jpg" class="slide">
</div>

<div class="filter">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('bottle')">Bottle</button>
<button onclick="filterCategory('steel')">Steel</button>
</div>

<!-- SAME BANNER -->
<div class="banner">
<div class="left">
<h1>MAHA LAUNCH</h1>
<h2>COMING SOON</h2>
</div>

<div class="center">
<p>Upto 50% OFF</p>
<img src="rr.png" class="qr-img">
</div>

<div class="right">
<img src="mart.png">
<h3>SP Mart</h3>
</div>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" data-category="bottle">
<img src="bottle.jpg">
<h3>Water Bottle</h3>
<p>₹300</p>
<button>Add</button>
</div>

<div class="card" data-category="steel">
<img src="bottle1.jpg">
<h3>Steel Bottle</h3>
<p>₹350</p>
<button>Add</button>
</div>

<div class="card" data-category="bottle">
<img src="bottle2.jpg">
<h3>Thermal Bottle</h3>
<p>₹421</p>
<button>Add</button>
</div>

<div class="card" data-category="bottle">
<img src="j.jpg">
<h3>Matte Claw</h3>
<p>₹150</p>
<button>Add</button>
</div>

</div>

<footer>
<h3>SP Mart</h3>
<p>Shop Non-Stop</p> <p>Email: spmart@email.com</p>
</footer>

<div class="footer-bottom">
© 2026 SP Mart Owner- Somin and palak Web desiner- Rishant
</div>

<script>
// 🔥 SLIDER SCRIPT
let slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(){
slides.forEach(s=>s.classList.remove("active"));
slides[index].classList.add("active");
index=(index+1)%slides.length;
}

setInterval(showSlide,3000);

// SEARCH
function liveSearch(){
let input=searchInput.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(input)?"block":"none";
});
}

// FILTER
function filterCategory(cat){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=(cat==="all"||c.dataset.category===cat)?"block":"none";
});
}
</script>

</body>
</html>
