<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SP Mart Ultra Fast</title>
<link rel="icon" href="mart.png">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#eaeded;
color:#111;
}

/* HEADER */
header{
background:#131921;
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:30px;
font-weight:bold;
color:#facc15;
}

.search-box{
display:flex;
flex:1;
max-width:700px;
min-width:260px;
}

.search-box input{
width:100%;
padding:12px;
border:none;
outline:none;
font-size:15px;
}

.search-box button{
padding:12px 16px;
border:none;
background:#febd69;
cursor:pointer;
font-weight:bold;
}

#cartBtn{
background:#facc15;
color:#000;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

/* HERO */
.hero{
width:100%;
height:320px;
background:url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=1600') center/cover;
display:flex;
align-items:center;
padding:30px;
}

.hero-box{
background:rgba(0,0,0,.55);
color:white;
padding:28px;
border-radius:12px;
max-width:450px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
margin-bottom:14px;
line-height:1.5;
}

.hero button{
padding:12px 18px;
border:none;
background:#facc15;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* PRODUCT SLIDER */
.slider{
width:95%;
height:320px;
margin:22px auto;
position:relative;
overflow:hidden;
border-radius:14px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.slide{
width:100%;
height:100%;
object-fit:contain;
position:absolute;
opacity:0;
transition:1s;
padding:10px;
}

.slide.active{
opacity:1;
}

.nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,.65);
color:white;
border:none;
padding:12px;
border-radius:50%;
cursor:pointer;
z-index:2;
}

.prev{left:12px}
.next{right:12px}

/* PRODUCTS */
.products{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
}

.card{
background:white;
padding:14px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:16px;
margin:10px 0;
min-height:42px;
}

.card p{
font-size:22px;
font-weight:bold;
color:#b12704;
}

.card button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#ffd814;
cursor:pointer;
font-weight:bold;
border-radius:8px;
}

/* LOAD MORE */
.load-box{
text-align:center;
padding:20px;
}

.load-box button{
padding:12px 20px;
border:none;
background:#131921;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CART */
#cartModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:9999;
}

#cartContent{
background:white;
width:360px;
max-height:90%;
overflow:auto;
padding:22px;
border-radius:12px;
}

#cartItems{
padding-left:18px;
margin:10px 0;
}

#cartContent input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ccc;
border-radius:8px;
}

.buyBtn,.closeBtn{
width:100%;
padding:11px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.buyBtn{background:#ffd814}

/* POPUP */
#popup{
position:fixed;
right:20px;
bottom:-100px;
background:#16a34a;
color:white;
padding:12px 18px;
border-radius:8px;
transition:.4s;
z-index:99999;
}

#popup.show{
bottom:20px;
}

footer{
background:#131921;
color:white;
text-align:center;
padding:16px;
margin-top:20px;
}

@media(max-width:768px){
.hero h1{font-size:30px}
.slider{height:240px}
}
</style>
</head>

<body>

<header>
<div class="logo">SP Mart</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search products...">
<button>🔍</button>
</div>

<div id="cartBtn">🛒 (<span id="count">0</span>)</div>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-box">
<h1>Biggest Sale 2026</h1>
<p>Mobiles, Fashion, Electronics, Home & 1000+ Products Lowest Price.</p>
<button onclick="window.scrollTo({top:420,behavior:'smooth'})">Shop Now</button>
</div>
</section>

<!-- PRODUCT SLIDER -->
<div class="slider">
<button class="nav prev">❮</button>

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=900" class="slide active">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=900" class="slide">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=900" class="slide">

<button class="nav next">❯</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<div class="load-box">
<button onclick="loadMore()">Load More</button>
</div>

<!-- CART -->
<div id="cartModal">
<div id="cartContent">

<h3>Your Cart</h3>
<ul id="cartItems"></ul>
<p id="cartTotal">Total ₹0</p>

<h4>Customer Details</h4>
<input type="text" id="custName" placeholder="Full Name">
<input type="email" id="custEmail" placeholder="Email">
<input type="text" id="custPhone" placeholder="Phone">
<input type="text" id="custAddress" placeholder="Address">

<button class="buyBtn" onclick="placeOrder()">Place Order</button>
<button class="closeBtn" onclick="closeCart()">Close</button>

</div>
</div>

<div id="popup"></div>

<footer>
© 2026 SP Mart Ultra Fast Store
</footer>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
/* EMAILJS */
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

let cart=[];

/* UNIQUE PRODUCT DATA */
const names=[
"iPhone 15 Pro","Samsung Galaxy S25","Boat Headphones","Nike Shoes",
"HP Laptop","Dell Laptop","Apple Watch","Steel Bottle",
"Travel Bag","Canon Camera","Bluetooth Speaker","Gaming Mouse",
"Mechanical Keyboard","Running Shoes","T-Shirt Black","Jeans Blue",
"Office Chair","Study Lamp","Power Bank","Printer",
"Coffee Mug","Wall Clock","Smart Tablet","Drone Camera",
"VR Headset","Sunglasses","Perfume","Backpack",
"Monitor HD","Mixer Grinder","Cookware Set","Yoga Mat"
];

const imgs=[
"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600",
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600",
"https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=600",
"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600",
"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=600",
"https://images.unsplash.com/photo-1547949003-9792a18a2601?w=600",
"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600",
"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600",
"https://images.unsplash.com/photo-1542272604-787c3835535d?w=600",
"https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=600",
"https://images.unsplash.com/photo-1483985988355-763728e1935b?w=600",
"https://images.unsplash.com/photo-1585386959984-a41552231658?w=600"
];

const products=[];

/* 1200 PRODUCTS */
for(let i=1;i<=1200;i++){
products.push({
name:names[i % names.length] + " " + i,
price:99 + (i*10),
img:imgs[i % imgs.length]
});
}

products.sort((a,b)=>a.price-b.price);

let shown=24;
let filteredProducts=[...products];

/* RENDER */
function renderProducts(){
const box=document.getElementById("products");
box.innerHTML="";

filteredProducts.slice(0,shown).forEach(p=>{
box.innerHTML += `
<div class="card">
<img src="${p.img}" loading="lazy">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
</div>`;
});
}
renderProducts();

/* LOAD MORE */
function loadMore(){
shown += 24;
renderProducts();
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("keyup",function(){
let val=this.value.toLowerCase();

filteredProducts = products.filter(p =>
p.name.toLowerCase().includes(val)
);

shown=24;
renderProducts();
});

/* CART */
function addToCart(name,price){
cart.push({name,price});
document.getElementById("count").innerText=cart.length;
showPopup(name+" Added");
}

document.getElementById("cartBtn").onclick=function(){
showCart();
};

function showCart(){
let total=0;
cartItems.innerHTML="";

cart.forEach(i=>{
cartItems.innerHTML += `<li>${i.name} ₹${i.price}</li>`;
total += i.price;
});

cartTotal.innerText="Total ₹"+total;
cartModal.style.display="flex";
}

function closeCart(){
cartModal.style.display="none";
}

/* PLACE ORDER EMAIL */
function placeOrder(){

let name=custName.value;
let email=custEmail.value;
let phone=custPhone.value;
let address=custAddress.value;

if(!name||!email||!phone||!address){
showPopup("Fill all details");
return;
}

if(cart.length===0){
showPopup("Cart Empty");
return;
}

let items = cart.map(i=>i.name+" ₹"+i.price).join(", ");
let total = cart.reduce((sum,i)=>sum+i.price,0);

emailjs.send(
"YOUR_SERVICE_ID",
"YOUR_TEMPLATE_ID",
{
to_email:"martsp72@gmail.com",
customer_name:name,
customer_email:email,
customer_phone:phone,
customer_address:address,
order_items:items,
order_total:total
}
).then(function(){

showPopup("Order Sent");
cart=[];
count.innerText=0;
closeCart();

}).catch(function(){
showPopup("Email Error");
});

}

/* POPUP */
function showPopup(msg){
popup.innerText=msg;
popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},2000);
}

/* SLIDER */
const slides=document.querySelectorAll(".slide");
let index=0;

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"));
slides[i].classList.add("active");
}

function nextSlide(){
index=(index+1)%slides.length;
showSlide(index);
}

function prevSlide(){
index=(index-1+slides.length)%slides.length;
showSlide(index);
}

document.querySelector(".next").onclick=nextSlide;
document.querySelector(".prev").onclick=prevSlide;

setInterval(nextSlide,3000);
</script>

</body>
</html>
